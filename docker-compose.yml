services:
  iperf-speedtest:
    build: .
    image: iperf-speedtest
    container_name: iperf-speedtest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - iperf-data:/data
    environment:
      IPERF_HOST: speedtest.init7.net
      IPERF_PORT: "5202"
      # IPERF_PARALLEL defaults to 16 (Init7's recommendation for filling a 10G line).
      IPERF_DURATION: "10"
      IPERF_OMIT: "2"
      # Runs once a day at a random time in this local-time window (kind to the server).
      TZ: Europe/Zurich
      DAILY_WINDOW_START_HOUR: "2"
      DAILY_WINDOW_END_HOUR: "5"
      # Uncomment to also run a test immediately on startup (otherwise it waits for the
      # window above, so a fresh deploy shows "no reading yet" until then).
      # RUN_ON_START: "true"
      HTTP_PORT: "8080"

volumes:
  iperf-data:
