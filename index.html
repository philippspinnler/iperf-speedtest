<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>Optical line — fibre throughput</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0B0D17;
    --panel: #12162680;
    --panel-solid: #121626;
    --hair: #232A40;
    --hair-soft: #1b2236;
    --text: #E9EBF5;
    --muted: #828AA6;
    --faint: #4d5573;
    --down: #B7A6FF;   /* periwinkle — receiving beam */
    --up:   #74E0C4;   /* mint-teal  — sending beam   */
    --bad:  #FF8A8A;

    --mono: "Spline Sans Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --sans: "Hanken Grotesk", ui-sans-serif, system-ui, -apple-system, sans-serif;

    --ease: cubic-bezier(.2, .7, 0, 1);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(120% 80% at 80% -10%, #1a1f3a 0%, transparent 55%),
      radial-gradient(90% 70% at -10% 110%, #161a30 0%, transparent 55%),
      var(--ink);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 4vw, 48px);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* faint instrument grid in the backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--hair-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--hair-soft) 1px, transparent 1px);
    background-size: 48px 48px;
    -webkit-mask-image: radial-gradient(80% 70% at 50% 40%, #000 0%, transparent 80%);
            mask-image: radial-gradient(80% 70% at 50% 40%, #000 0%, transparent 80%);
    opacity: .5;
    pointer-events: none;
    z-index: 0;
  }

  .panel {
    position: relative;
    z-index: 1;
    width: min(680px, 100%);
    min-width: 0;       /* let the flex-centred panel shrink instead of overflowing on mobile */
    background: var(--panel);
    border: 1px solid var(--hair);
    border-radius: 18px;
    padding: clamp(22px, 4.5vw, 42px);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    box-shadow:
      0 1px 0 rgba(255,255,255,.04) inset,
      0 40px 80px -40px rgba(0,0,0,.8);
    opacity: 0;
    transform: translateY(14px);
    animation: rise .8s var(--ease) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: none; } }

  /* ---- header ---- */
  .head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: clamp(20px, 3vw, 30px);
    border-bottom: 1px solid var(--hair);
    margin-bottom: clamp(22px, 3.5vw, 34px);
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .target {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: clamp(15px, 2.4vw, 18px);
    color: var(--text);
    letter-spacing: -.01em;
  }
  .headright {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--faint);
    box-shadow: 0 0 0 0 transparent;
  }
  .status[data-state="live"] .dot {
    background: var(--up);
    animation: pulse 2.4s var(--ease) infinite;
  }
  .status[data-state="error"] .dot { background: var(--bad); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(116,224,196,.5); }
    70%  { box-shadow: 0 0 0 7px rgba(116,224,196,0); }
    100% { box-shadow: 0 0 0 0 rgba(116,224,196,0); }
  }
  .latency {
    text-align: right;
    line-height: 1;
  }
  .latency .lnum {
    font-family: var(--mono);
    font-size: clamp(20px, 4vw, 26px);
    font-weight: 500;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .latency .lunit { font-family: var(--sans); font-size: 12px; color: var(--muted); margin-left: 3px; }
  .latency .llabel {
    display: block;
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  /* ---- readouts ---- */
  .readout { padding: clamp(14px, 2.4vw, 20px) 0; }
  .readout + .readout { border-top: 1px solid var(--hair-soft); }

  .rhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .label .tick {
    width: 14px; height: 2px; border-radius: 2px;
    background: var(--accent);
  }
  .value {
    line-height: 1;
    white-space: nowrap;
    margin-top: clamp(8px, 1.4vw, 12px);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .num {
    font-family: var(--mono);
    font-weight: 500;
    font-size: clamp(52px, 13vw, 100px);
    letter-spacing: -.045em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 38px var(--accent-glow);
  }
  .unit {
    font-family: var(--sans);
    font-size: clamp(13px, 2vw, 16px);
    color: var(--muted);
    letter-spacing: .02em;
  }
  .sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--faint);
  }

  /* ---- the signature: shared-scale capacity meter ---- */
  .meter {
    margin-top: clamp(14px, 2vw, 18px);
    position: relative;
    height: 10px;
    border-radius: 6px;
    background: #0a0c16;
    border: 1px solid var(--hair-soft);
    overflow: hidden;
  }
  .fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0;
    border-radius: 6px;
    background: linear-gradient(90deg, color-mix(in oklab, var(--accent) 55%, transparent), var(--accent));
    box-shadow: 0 0 20px -2px var(--accent-glow);
    transition: width 1.1s var(--ease);
  }
  .ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ticks i {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--hair);
  }
  .scale {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .04em;
    color: var(--faint);
  }
  .scale .cap { color: var(--muted); }

  /* ---- footer ledger ---- */
  .ledger {
    margin-top: clamp(24px, 3.6vw, 36px);
    padding-top: clamp(16px, 2.4vw, 22px);
    border-top: 1px solid var(--hair);
    display: flex;
    flex-wrap: wrap;
    gap: 10px 26px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .ledger span { color: var(--text); }

  /* ---- history ---- */
  .history {
    margin-top: clamp(26px, 4vw, 38px);
    padding-top: clamp(20px, 3vw, 28px);
    border-top: 1px solid var(--hair);
  }
  .hhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: clamp(16px, 2.4vw, 22px);
  }
  .seg {
    display: inline-flex;
    background: #0a0c16;
    border: 1px solid var(--hair-soft);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: color .2s var(--ease), background .2s var(--ease);
  }
  .seg button:hover { color: var(--text); }
  .seg button[aria-selected="true"] {
    background: var(--hair);
    color: var(--text);
  }
  .seg button:focus-visible { outline: 2px solid var(--down); outline-offset: 2px; }

  .chartwrap { position: relative; }
  .chart svg { display: block; width: 100%; height: auto; }
  .guide {
    position: absolute;
    top: 0; width: 1px;
    background: linear-gradient(var(--muted), transparent);
    pointer-events: none;
    opacity: .8;
  }
  .tip {
    position: absolute;
    top: 0;
    transform: translate(-50%, -8px);
    background: rgba(10, 12, 22, .92);
    border: 1px solid var(--hair);
    border-radius: 10px;
    padding: 9px 11px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    color: var(--text);
    white-space: nowrap;
    pointer-events: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 12px 30px -12px rgba(0,0,0,.9);
    z-index: 3;
  }
  .tip .tdate { color: var(--muted); margin-bottom: 5px; letter-spacing: .03em; }
  .tip .trow { display: flex; align-items: center; gap: 7px; }
  .tip .trow i { width: 8px; height: 8px; border-radius: 2px; }
  .tip .tval { margin-left: auto; padding-left: 14px; }

  .legend {
    display: flex;
    gap: 18px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .legend i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }

  .hempty {
    padding: 30px 8px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ---- empty / error states ---- */
  .note {
    text-align: center;
    padding: clamp(36px, 8vw, 72px) 12px;
    color: var(--muted);
  }
  .note h2 {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(17px, 3vw, 21px);
    color: var(--text);
    margin: 0 0 10px;
    letter-spacing: -.01em;
  }
  .note p { margin: 0; font-size: 14px; line-height: 1.5; max-width: 36ch; margin-inline: auto; }

  [hidden] { display: none !important; }

  @media (prefers-reduced-motion: reduce) {
    .panel { animation: none; opacity: 1; transform: none; }
    .fill { transition: none; }
    .status .dot { animation: none; }
  }
</style>
</head>
<body>
  <main class="panel" role="main">
    <header class="head">
      <div>
        <div class="eyebrow">Fibre throughput · latest reading</div>
        <div class="target" id="target">—</div>
      </div>
      <div class="headright">
        <div class="status" id="status" data-state="idle">
          <span class="dot"></span><span id="statusText">Establishing link…</span>
        </div>
        <div class="latency" id="latency" hidden>
          <span class="lnum" id="pingNum">—</span><span class="lunit">ms</span>
          <span class="llabel">Latency</span>
        </div>
      </div>
    </header>

    <!-- live readouts -->
    <section id="readouts" hidden>
      <div class="readout" style="--accent: var(--down); --accent-glow: #b7a6ff55;">
        <div class="rhead">
          <div class="label"><span class="tick"></span>Download</div>
          <div class="sub" id="downSub">— Mbps</div>
        </div>
        <div class="value"><span class="num" id="downNum">0.0</span><span class="unit">Gbit/s</span></div>
        <div class="meter"><div class="ticks" id="downTicks"></div><div class="fill" id="downFill"></div></div>
        <div class="scale"><span>0</span><span class="cap" id="downCap">/ — line</span></div>
      </div>

      <div class="readout" style="--accent: var(--up); --accent-glow: #74e0c455;">
        <div class="rhead">
          <div class="label"><span class="tick"></span>Upload</div>
          <div class="sub" id="upSub">— Mbps</div>
        </div>
        <div class="value"><span class="num" id="upNum">0.0</span><span class="unit">Gbit/s</span></div>
        <div class="meter"><div class="ticks" id="upTicks"></div><div class="fill" id="upFill"></div></div>
        <div class="scale"><span>0</span><span class="cap" id="upCap">/ — line</span></div>
      </div>

      <footer class="ledger" id="ledger"></footer>

      <!-- history -->
      <section class="history" id="history" hidden>
        <div class="hhead">
          <span class="eyebrow">History</span>
          <div class="seg" id="seg" role="tablist" aria-label="History window">
            <button role="tab" data-win="week">Week</button>
            <button role="tab" data-win="month" aria-selected="true">Month</button>
            <button role="tab" data-win="year">Year</button>
          </div>
        </div>
        <div class="chartwrap" id="chartwrap">
          <div class="chart" id="chart"></div>
          <div class="guide" id="guide" hidden></div>
          <div class="tip" id="tip" hidden></div>
          <div class="hempty" id="hempty" hidden></div>
        </div>
        <div class="legend">
          <span><i style="background:var(--down)"></i>Download</span>
          <span><i style="background:var(--up)"></i>Upload</span>
        </div>
      </section>
    </section>

    <!-- empty / error -->
    <section class="note" id="note" hidden>
      <h2 id="noteTitle"></h2>
      <p id="noteBody"></p>
    </section>
  </main>

<script>
  const API = "/api/speedtest/latest";
  const HIST_API = "/api/speedtest/history";
  const POLL_MS = 30000;
  // Nice ceilings (Gbit/s) the meter and chart snap up to. 25 = Init7's symmetric max.
  const STEPS = [0.1, 0.25, 0.5, 1, 2.5, 5, 10, 25, 50, 100];
  const WINDOWS = { week: 7, month: 30, year: 365 };
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  const $ = (id) => document.getElementById(id);
  const els = {
    status: $("status"), statusText: $("statusText"), target: $("target"),
    latency: $("latency"), pingNum: $("pingNum"),
    readouts: $("readouts"), note: $("note"), noteTitle: $("noteTitle"), noteBody: $("noteBody"),
    ledger: $("ledger"),
    history: $("history"), seg: $("seg"), chart: $("chart"), chartwrap: $("chartwrap"),
    guide: $("guide"), tip: $("tip"), hempty: $("hempty"),
    down: { num: $("downNum"), sub: $("downSub"), fill: $("downFill"), ticks: $("downTicks"), cap: $("downCap") },
    up:   { num: $("upNum"),   sub: $("upSub"),   fill: $("upFill"),   ticks: $("upTicks"),   cap: $("upCap") },
  };

  let lastTs = null;          // timestamp of the reading currently shown
  let ledgerTimer = null;     // keeps the "measured … ago" line current
  let historyData = [];       // full rolling history (oldest -> newest)
  let winKey = "month";       // selected history window
  let plotted = [];           // points drawn in the current chart (with pixel coords)

  function ceilingFor(maxGbps) {
    for (const s of STEPS) if (maxGbps <= s * 0.985) return s;
    return Math.ceil(maxGbps / 10) * 10;
  }

  function fmtGbps(g) {
    // 0.0–9.9 → one decimal; 10+ → whole numbers (no false precision at high rates)
    return g >= 10 ? Math.round(g).toString() : g.toFixed(1);
  }

  function relTime(iso) {
    const d = new Date(iso);
    const s = Math.max(0, (Date.now() - d.getTime()) / 1000);
    if (s < 90) return "just now";
    if (s < 5400) return Math.round(s / 60) + " min ago";
    if (s < 172800) return Math.round(s / 3600) + " h ago";
    return Math.round(s / 86400) + " d ago";
  }

  function renderTicks(host, ceil) {
    // a tick per nice division so you can read the scale at a glance
    const divs = ceil <= 1 ? 10 : (ceil === 2.5 ? 5 : (ceil <= 10 ? ceil : (ceil <= 25 ? 5 : 10)));
    host.innerHTML = "";
    for (let i = 1; i < divs; i++) {
      const t = document.createElement("i");
      t.style.left = (i / divs * 100) + "%";
      host.appendChild(t);
    }
  }

  function countUp(el, to) {
    if (reduceMotion) { el.textContent = fmtGbps(to); return; }
    const start = performance.now(), dur = 1100, from = 0;
    function step(now) {
      const p = Math.min(1, (now - start) / dur);
      const e = 1 - Math.pow(1 - p, 3);          // ease-out cubic
      el.textContent = fmtGbps(from + (to - from) * e);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = fmtGbps(to);
    }
    requestAnimationFrame(step);
  }

  function show(view) {
    els.readouts.hidden = view !== "data";
    els.note.hidden = view !== "note";
  }

  function setStatus(state, text) {
    els.status.dataset.state = state;
    els.statusText.textContent = text;
  }

  function paintLedger(d) {
    const parts = [
      ["streams", "16"],         // -P default; collector doesn't expose it, so this mirrors the default
      ["sample", "10 s"],
      ["measured", relTime(d.timestamp)],
    ];
    els.ledger.innerHTML = parts
      .map(([k, v]) => `${k} <span>${v}</span>`)
      .join('<span style="color:var(--faint)">·</span> ');
  }

  function render(d) {
    const dG = (d.download ?? 0) / 1000;
    const uG = (d.upload ?? 0) / 1000;
    const ceil = ceilingFor(Math.max(dG, uG, 0.1));
    const capLabel = `/ ${ceil} Gbit/s line`;

    setStatus("live", "Live");
    els.down.sub.textContent = `${Math.round(d.download ?? 0)} Mbps`;
    els.up.sub.textContent = `${Math.round(d.upload ?? 0)} Mbps`;
    els.down.cap.textContent = capLabel;
    els.up.cap.textContent = capLabel;
    renderTicks(els.down.ticks, ceil);
    renderTicks(els.up.ticks, ceil);

    if (d.ping_ms != null) {
      els.pingNum.textContent = d.ping_ms;
      els.latency.hidden = false;
    } else {
      els.latency.hidden = true;
    }

    const fresh = d.timestamp !== lastTs;
    lastTs = d.timestamp;

    show("data");
    requestAnimationFrame(() => {
      els.down.fill.style.width = Math.min(100, dG / ceil * 100) + "%";
      els.up.fill.style.width = Math.min(100, uG / ceil * 100) + "%";
    });
    if (fresh) { countUp(els.down.num, dG); countUp(els.up.num, uG); }
    else { els.down.num.textContent = fmtGbps(dG); els.up.num.textContent = fmtGbps(uG); }

    paintLedger(d);
    clearInterval(ledgerTimer);
    ledgerTimer = setInterval(() => paintLedger(d), 60000);

    if (fresh) fetchHistory();
  }

  function noteView(state, title, body) {
    setStatus(state, state === "error" ? "Offline" : "Waiting");
    els.noteTitle.textContent = title;
    els.noteBody.textContent = body;
    show("note");
  }

  // ---------- history chart ----------

  function fmtDate(t, key) {
    const d = new Date(t);
    if (key === "year") return d.toLocaleDateString(undefined, { month: "short" });
    return d.toLocaleDateString(undefined, { day: "2-digit", month: "2-digit" });
  }

  function svgEl(tag, attrs) {
    let s = `<${tag}`;
    for (const k in attrs) s += ` ${k}="${attrs[k]}"`;
    return s + ">";
  }

  function renderChart() {
    const days = WINDOWS[winKey];
    const now = Date.now();
    const tStart = now - days * 86400e3;
    const pts = historyData
      .filter((d) => new Date(d.timestamp).getTime() >= tStart)
      .map((d) => ({ t: new Date(d.timestamp).getTime(), d: (d.download || 0) / 1000, u: (d.upload || 0) / 1000, ping: d.ping_ms }))
      .sort((a, b) => a.t - b.t);

    els.guide.hidden = true; els.tip.hidden = true;

    if (pts.length === 0) {
      els.chart.innerHTML = "";
      els.hempty.hidden = false;
      els.hempty.textContent = historyData.length
        ? "No tests recorded in this window yet."
        : "History builds up as daily tests run — check back after a few days.";
      plotted = [];
      return;
    }
    els.hempty.hidden = true;

    const W = 720, H = 240, PL = 38, PR = 14, PT = 16, PB = 28;
    const ax0 = PL, ax1 = W - PR, ay0 = H - PB, ay1 = PT;
    const span = Math.max(1, now - tStart);

    // Auto-scale the y-axis to the data (with padding) and label it, so day-to-day
    // variation is visible — the meter above already shows absolute proximity to line rate.
    const vals = pts.flatMap((p) => [p.d, p.u]);
    let yLo = Math.min(...vals), yHi = Math.max(...vals);
    if (yHi - yLo < 0.2) { const m = (yHi + yLo) / 2; yLo = m - 0.3; yHi = m + 0.3; }
    const pad = (yHi - yLo) * 0.25;
    yLo = Math.max(0, yLo - pad); yHi = yHi + pad;
    const sx = (t) => ax0 + (t - tStart) / span * (ax1 - ax0);
    const sy = (v) => ay0 - (v - yLo) / (yHi - yLo) * (ay0 - ay1);

    pts.forEach((p) => { p.x = sx(p.t); p.dy = sy(p.d); p.uy = sy(p.u); });
    plotted = pts;

    let g = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, preserveAspectRatio: "xMidYMid meet", role: "img", "aria-label": `Download and upload (Gbit/s) over the last ${winKey}` });

    // horizontal gridlines + y labels (Gbit/s) at bottom, middle, top of the range
    [0, 0.5, 1].forEach((f) => {
      const y = ay0 - f * (ay0 - ay1);
      g += svgEl("line", { x1: ax0, y1: y, x2: ax1, y2: y, stroke: "var(--hair-soft)", "stroke-width": 1, "vector-effect": "non-scaling-stroke" }) + "</line>";
      g += svgEl("text", { x: ax0 - 8, y: y + 3, "text-anchor": "end", fill: "var(--faint)", "font-family": "var(--mono)", "font-size": 10 }) + fmtGbps(yLo + f * (yHi - yLo)) + "</text>";
    });

    // x date ticks
    const nticks = Math.min(5, Math.max(2, pts.length));
    for (let i = 0; i < nticks; i++) {
      const t = tStart + (i / (nticks - 1)) * span;
      const x = sx(t);
      g += svgEl("text", { x, y: H - 8, "text-anchor": i === 0 ? "start" : (i === nticks - 1 ? "end" : "middle"), fill: "var(--faint)", "font-family": "var(--mono)", "font-size": 10 }) + fmtDate(t, winKey) + "</text>";
    }

    const line = (key) => pts.map((p, i) => `${i ? "L" : "M"}${p.x.toFixed(1)},${p[key].toFixed(1)}`).join(" ");

    if (pts.length > 1) {
      g += svgEl("path", { d: line("uy"), fill: "none", stroke: "var(--up)", "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round", "vector-effect": "non-scaling-stroke" }) + "</path>";
      g += svgEl("path", { d: line("dy"), fill: "none", stroke: "var(--down)", "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round", "vector-effect": "non-scaling-stroke" }) + "</path>";
    }

    // dots for sparse windows
    if (pts.length <= 31) {
      pts.forEach((p) => {
        g += svgEl("circle", { cx: p.x.toFixed(1), cy: p.uy.toFixed(1), r: 2.5, fill: "var(--ink)", stroke: "var(--up)", "stroke-width": 1.5, "vector-effect": "non-scaling-stroke" }) + "</circle>";
        g += svgEl("circle", { cx: p.x.toFixed(1), cy: p.dy.toFixed(1), r: 2.5, fill: "var(--ink)", stroke: "var(--down)", "stroke-width": 1.5, "vector-effect": "non-scaling-stroke" }) + "</circle>";
      });
    }

    g += "</svg>";
    els.chart.innerHTML = g;
  }

  function moveTip(e) {
    if (!plotted.length) return;
    const svg = els.chart.querySelector("svg");
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const vbX = (clientX - rect.left) / rect.width * 720;
    let best = null, bd = Infinity;
    for (const p of plotted) { const dd = Math.abs(p.x - vbX); if (dd < bd) { bd = dd; best = p; } }
    if (!best) return;

    const leftPct = best.x / 720 * 100;
    els.guide.style.left = leftPct + "%";
    els.guide.style.height = (best.dy < best.uy ? best.dy : best.uy) / 240 * 100 + "%";
    els.guide.hidden = false;

    const pingTxt = best.ping != null ? `<div class="trow"><span class="tdate" style="margin:0">ping</span><span class="tval">${best.ping} ms</span></div>` : "";
    els.tip.innerHTML =
      `<div class="tdate">${new Date(best.t).toLocaleDateString(undefined, { weekday: "short", day: "2-digit", month: "short" })}</div>` +
      `<div class="trow"><i style="background:var(--down)"></i>down<span class="tval">${fmtGbps(best.d)} Gbit/s</span></div>` +
      `<div class="trow"><i style="background:var(--up)"></i>up<span class="tval">${fmtGbps(best.u)} Gbit/s</span></div>` +
      pingTxt;
    els.tip.style.left = Math.min(88, Math.max(12, leftPct)) + "%";
    els.tip.hidden = false;
  }
  function hideTip() { els.guide.hidden = true; els.tip.hidden = true; }

  function selectWindow(key) {
    winKey = key;
    [...els.seg.children].forEach((b) => b.setAttribute("aria-selected", String(b.dataset.win === key)));
    renderChart();
  }

  function renderHistory() {
    els.history.hidden = historyData.length < 1;
    if (!els.history.hidden) renderChart();
  }

  async function fetchHistory() {
    try {
      const r = await fetch(HIST_API, { cache: "no-store" });
      if (!r.ok) return;
      const arr = await r.json();
      if (Array.isArray(arr)) { historyData = arr; renderHistory(); }
    } catch { /* leave the last chart in place */ }
  }

  async function poll() {
    try {
      const r = await fetch(API, { cache: "no-store" });
      if (r.status === 503) {
        noteView("idle", "No reading yet",
          "The first test runs in the nightly window. Set RUN_ON_START=true to test right away.");
        return;
      }
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      if (d && (d.download != null || d.upload != null)) render(d);
      else noteView("idle", "No reading yet", "Waiting for the first measurement to complete.");
    } catch (e) {
      if (lastTs) setStatus("error", "Reconnecting…");
      else noteView("error", "Can't reach the collector",
        "The dashboard is up but the speedtest service isn't answering. Retrying…");
    }
  }

  els.target.textContent = location.hostname || "speedtest.init7.net";
  els.seg.addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) selectWindow(b.dataset.win); });
  els.chart.addEventListener("pointermove", moveTip);
  els.chart.addEventListener("pointerleave", hideTip);
  els.chart.addEventListener("touchmove", moveTip, { passive: true });
  els.chart.addEventListener("touchend", hideTip);
  window.addEventListener("resize", () => { if (!els.history.hidden) renderChart(); });

  poll();
  fetchHistory();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
